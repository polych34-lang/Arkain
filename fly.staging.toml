# Fly.io app config — staging. See docs/deployment.md for the full setup
# (account creation, `fly launch`, secrets, Postgres) — this file alone does
# not provision anything; `flyctl deploy -c fly.staging.toml` does.
app = "arkain-staging"
primary_region = "icn" # Seoul — closest region to Korean marketplace APIs and sellers

[build]

[env]
  NODE_ENV = "staging"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
