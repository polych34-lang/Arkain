# Fly.io app config — staging. See docs/deployment.md for the full setup
# (account creation, `fly launch`, secrets, Postgres) — this file alone does
# not provision anything; `flyctl deploy -c fly.staging.toml` does.
app = "arkain-staging"
# icn (Seoul) is not an available Fly.io machine region (confirmed via
# `fly platform regions` and a live deploy failure: "Region 'icn' cannot
# host your machine"). nrt (Tokyo) is the closest available region to Korea.
primary_region = "nrt"

[build]

[deploy]
  # Runs in a temporary machine on Fly's private network before the new
  # release is promoted — a plain GitHub Actions runner cannot reach the
  # Postgres app's .flycast address, so migrations must happen here, not in
  # deploy.yml. A failure here aborts the deploy. Needs DATABASE_URL set as a
  # Fly app secret (`fly secrets set -a arkain-staging DATABASE_URL=...`).
  release_command = "npm run db:deploy"

[env]
  NODE_ENV = "staging"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
