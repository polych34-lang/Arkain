# Fly.io app config — production. See docs/deployment.md. Deployed only via
# the manually-gated `deploy-production` job (GitHub Environment protection),
# never automatically on push.
app = "arkain-production"
primary_region = "icn"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
