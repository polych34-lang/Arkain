# Fly.io app config — production. See docs/deployment.md. Deployed only via
# the manually-gated `deploy-production` job (GitHub Environment protection),
# never automatically on push.
app = "arkain-production"
# See fly.staging.toml — icn (Seoul) is not an available Fly.io machine
# region; nrt (Tokyo) is the closest available one.
primary_region = "nrt"

[build]

[deploy]
  # See fly.staging.toml — same reasoning, runs on Fly's private network.
  # Needs DATABASE_URL set as a Fly app secret
  # (`fly secrets set -a arkain-production DATABASE_URL=...`).
  release_command = "npm run db:deploy"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
