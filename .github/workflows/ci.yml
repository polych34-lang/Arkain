name: CI

on:
  push:
    # ARK-28: the repo's default branch is `master`, not `main` — this
    # trigger never fired before. See docs/deployment.md.
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Guardrail: fail the build if a real secret is committed. Lightweight
  # baseline; a dedicated scanner (gitleaks/trufflehog) is added pre-launch.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block committed .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example'; then
            echo "::error::A .env file is tracked in git. Remove it and use the secret manager."
            exit 1
          fi
          echo "No tracked .env files. OK."

  # ARK-28: sanity-check the production image builds on every PR, without
  # pushing anywhere. The real build+push (used for deploys) is
  # .github/workflows/deploy.yml, gated to master.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: arkain:ci-check
